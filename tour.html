<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour | Ricardo Arjona</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2c2c2c; 
            color: #f4f4f4; 
        }

        /* FOTO DE CABECERA CORREGIDA (Sin recortes) */
        .tour-header-img {
            width: 100%;
            height: auto; /* Mantiene la proporción original de la imagen */
            display: block; /* Evita espacios en blanco debajo de la imagen */
            border-bottom: 5px solid #b91d1d;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .event-card {
            background-color: #3d3d3d;
            padding: 30px;
            border-radius: 4px;
            border-left: 10px solid #b91d1d;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Permite que el botón baje en pantallas de celular */
            gap: 20px;
        }

        .event-info h3 {
            color: #ffffff;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .event-info p {
            margin: 5px 0;
            color: #aaaaaa;
        }

        .btn-comprar {
            background-color: #b91d1d;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
            text-align: center;
            white-space: nowrap; /* Evita que el texto del botón se rompa en dos líneas */
        }

        .btn-comprar:hover {
            background-color: #e62424;
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #888;
            background-color: #1a1a1a;
        }

        /* Diseño responsivo para celulares */
        @media (max-width: 600px) {
            .event-card {
                flex-direction: column;
                text-align: center;
            }
            .btn-comprar {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Imagen superior ya sin cortes -->
    <img src="RICARDO-ARJONA-TOUR.png" alt="Ricardo Arjona Tour" class="tour-header-img">

    <main class="container">
        <h2>Próximas Fechas Oficiales</h2>
        <p>Asegura tu lugar en el próximo concierto. Todas las compras se redirigen a la taquilla oficial.</p>

        <!-- ============================================== -->
        <!-- PLANTILLA DE CONCIERTO (Copia y pega para añadir más) -->
        <!-- ============================================== -->
        <div class="event-card">
            <div class="event-info">
                <h3>[Nombre de la Ciudad / País]</h3>
                <p>[Nombre del Estadio o Recinto]</p>
                <p><strong>Fecha:</strong> [Día y Mes]</p>
            </div>
            <!-- El enlace lleva directamente a la página que pediste -->
            <a href="https://ricardoarjona.com/tour/" target="_blank" class="btn-comprar">Comprar Entradas</a>
        </div>
        <!-- ============================================== -->

    </main>

    <footer>
        <p>&copy; 2026 Proyecto Web Ricardo Arjona | Tour Oficial</p>
    </footer>

</body>
</html>
