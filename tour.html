<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour | Ricardo Arjona</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2c2c2c; 
            color: #f4f4f4; 
        }

        /* FOTO DE CABECERA (Sin recortes) */
        .tour-header-img {
            width: 100%;
            height: auto; 
            display: block; 
            border-bottom: 5px solid #b91d1d;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
            text-align: center; /* Centramos el texto para este nuevo diseño */
        }

        .tour-info-box {
            background-color: #3d3d3d;
            padding: 50px 30px;
            border-radius: 4px;
            border-top: 10px solid #b91d1d;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        .tour-info-box h2 {
            color: #ffffff;
            text-transform: uppercase;
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .tour-info-box p {
            font-size: 1.2rem;
            color: #cccccc;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .btn-container {
            margin-top: 20px;
        }

        .btn-comprar {
            background-color: #b91d1d;
            color: white;
            padding: 20px 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-comprar:hover {
            background-color: #e62424;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(185, 29, 29, 0.5);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #888;
            background-color: #1a1a1a;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <!-- Imagen superior con altura automática para evitar cortes -->
    <img src="RICARDO-ARJONA-TOUR.png" alt="Ricardo Arjona - Tour" class="tour-header-img">

    <main class="container">
        <div class="tour-info-box">
            <h2>Próximas Fechas Oficiales</h2>
            <p>Asegura tu lugar en el próximo concierto. Descubre si el Tour pasa por tu ciudad y adquiere tus boletos directamente en la taquilla oficial.</p>

            <div class="btn-container">
                <a href="https://ricardoarjona.com/tour/" target="_blank" class="btn-comprar">Ver Fechas y Comprar Entradas</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Proyecto Web Ricardo Arjona | Tour Oficial</p>
    </footer>

</body>
</html>
