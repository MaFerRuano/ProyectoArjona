<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analíticas - Proyecto Arjona</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px 40px;
        }

        #pantallaBloqueo {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80vh;
            text-align: center;
        }

        #pantallaBloqueo h1 {
            color: #b91d1d;
            font-size: 3rem;
            text-transform: uppercase;
        }

        #dashboardPrincipal {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-dashboard {
            border-bottom: 2px solid #3d3d3d;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end; 
            flex-wrap: wrap;
            gap: 20px;
        }

        .titulos-header h1 {
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 5px 0;
            font-size: 1.8rem;
        }

        .titulos-header h2 {
            margin: 0;
            /* NOTA MAFER: Aumenté el tamaño a 1.3rem (antes era 1rem) */
            font-size: 1.3rem; 
            color: #aaaaaa;
            font-weight: normal;
        }

        .titulos-header h2 span {
            color: #b91d1d;
            font-weight: bold;
            text-transform: uppercase;
        }

        .controles-fecha {
            display: flex;
            gap: 15px;
            align-items: center;
            background-color: #2c2c2c;
            padding: 10px 20px;
            border-radius: 6px;
            border-left: 4px solid #b91d1d;
        }

        .controles-fecha label {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #aaaaaa;
        }

        .controles-fecha input[type="date"] {
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 10px;
            border-radius: 4px;
            color-scheme: dark;
            font-family: inherit;
        }

        .btn-filtrar {
            background-color: #b91d1d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-filtrar:hover { background-color: #e62424; }

        .stats-rapidas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-caja {
            background-color: #242424;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .stat-caja h4 { margin: 0; color: #888888; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;}
        .stat-caja p { margin: 10px 0 0 0; font-size: 2.2rem; font-weight: bold; color: #ffffff; }

        .panel-grafica {
            background-color: #242424;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }

        .panel-grafica h3 {
            margin-top: 0;
            text-transform: uppercase;
            font-size: 1rem;
            color: #aaaaaa;
            margin-bottom: 20px;
        }

        .canvas-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .grid-listas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .lista-contenedor {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .lista-item {
            position: relative;
            background-color: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            border: 1px solid #333;
        }

        .lista-barra-fondo {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background-color: rgba(185, 29, 29, 0.2); 
            border-left: 3px solid #b91d1d; 
            z-index: 1;
            transition: width 0.5s ease;
        }

        .lista-texto, .lista-valor {
            position: relative;
            z-index: 2;
            font-size: 0.9rem;
        }
        
        .lista-valor {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="pantallaBloqueo">
        <h1>Acceso Restringido</h1>
        <p>Verificando credenciales de administrador...</p>
    </div>

    <div id="dashboardPrincipal">
        <div class="header-dashboard">
            <div class="titulos-header">
                <h1>Analíticas - Proyecto Arjona</h1>
                <h2>Bienvenida, <span id="nombreAdmin">...</span></h2>
            </div>
            
            <div class="controles-fecha">
                <label>Desde:</label>
                <input type="date" id="fechaInicio">
                <label>Hasta:</label>
                <input type="date" id="fechaFin">
                <button class="btn-filtrar" onclick="aplicarFiltros()">Filtrar</button>
            </div>
        </div>

        <div class="stats-rapidas">
            <div class="stat-caja">
                <h4>Total de Visitas</h4>
                <p id="totalVisitas">0</p>
            </div>
            <div class="stat-caja">
                <h4>Página más popular</h4>
                <p id="topPage" style="font-size: 1.5rem; padding-top:10px;">-</p>
            </div>
            <div class="stat-caja">
                <h4>Inicios de Sesión</h4>
                <p id="totalLogins">0</p>
            </div>
        </div>

        <div class="panel-grafica">
            <h3>Visitas a lo largo del tiempo</h3>
            <div class="canvas-container">
                <canvas id="graficaTiempo"></canvas>
            </div>
        </div>

        <div class="grid-listas">
            <div class="panel-grafica">
                <h3>Páginas (Page)</h3>
                <div class="lista-contenedor" id="listaPaginas"></div>
            </div>
            <div class="panel-grafica">
                <h3>Navegadores (Browser)</h3>
                <div class="lista-contenedor" id="listaNavegadores"></div>
            </div>
            <div class="panel-grafica">
                <h3>Países (Country)</h3>
                <div class="lista-contenedor" id="listaPaises"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myChart = null; 

        window.onload = () => {
            const hoy = new Date();
            const haceUnaSemana = new Date();
            haceUnaSemana.setDate(hoy.getDate() - 7);

            document.getElementById('fechaFin').value = hoy.toISOString().substring(0, 10);
            document.getElementById('fechaInicio').value = haceUnaSemana.toISOString().substring(0, 10);
            
            cargarDashboard();
        };

        function aplicarFiltros() {
            cargarDashboard();
        }

        async function cargarDashboard() {
            const { data: { session } } = await clienteSupabase.auth.getSession();
            if (!session) { document.getElementById('pantallaBloqueo').innerHTML = "<h1>Error</h1><p>Debes iniciar sesión.</p>"; return; }

            const { data: admins } = await clienteSupabase.from('admins').select('*').eq('email', session.user.email);
            if (!admins || admins.length === 0) {
                document.getElementById('pantallaBloqueo').innerHTML = "<h1>Denegado</h1><p>No eres administrador.</p>"; return;
            }

            document.getElementById('pantallaBloqueo').style.display = 'none';
            document.getElementById('dashboardPrincipal').style.display = 'block';

            // ESTABLECER EL NOMBRE DE BIENVENIDA
            const correo = session.user.email;
            const nombreTemporal = correo.split('@')[0];
            document.getElementById('nombreAdmin').innerText = nombreTemporal;

            // FILTROS DE FECHA SEGUROS
            const fInicio = document.getElementById('fechaInicio').value;
            const fFin = document.getElementById('fechaFin').value;

            let query = clienteSupabase.from('analiticas').select('*');
            if (fInicio) query = query.gte('created_at', `${fInicio}T00:00:00.000Z`);
            if (fFin) query = query.lte('created_at', `${fFin}T23:59:59.999Z`);

            const { data: analiticas, error } = await query;
            if (error) { console.error(error); return; }

            let totalVistas = 0;
            const conteoPaginas = {};
            const conteoNavegadores = {};
            const conteoPaises = {};
            const conteoFechas = {}; 

            analiticas.forEach(reg => {
                if (reg.event_type === 'page_view') {
                    totalVistas++;
                    
                    // ==========================================
                    // NOTA MAFER: EXTRACCIÓN DE FECHA INFALIBLE
                    // ==========================================
                    const fechaReal = new Date(reg.created_at);
                    const anio = fechaReal.getFullYear();
                    const mes = String(fechaReal.getMonth() + 1).padStart(2, '0');
                    const diaNum = String(fechaReal.getDate()).padStart(2, '0');
                    const diaTexto = `${anio}-${mes}-${diaNum}`; // Formato exacto YYYY-MM-DD
                    
                    conteoFechas[diaTexto] = (conteoFechas[diaTexto] || 0) + 1;

                    let pag = reg.page_url.replace('.html', '').toUpperCase();
                    conteoPaginas[pag] = (conteoPaginas[pag] || 0) + 1;
                    
                    let nav = reg.browser || 'Desconocido';
                    conteoNavegadores[nav] = (conteoNavegadores[nav] || 0) + 1;

                    let pais = reg.country || 'Guatemala';
                    conteoPaises[pais] = (conteoPaises[pais] || 0) + 1;
                }
            });

            document.getElementById('totalVisitas').innerText = totalVistas;
            
            let maxVistas = 0, pagGanadora = "-";
            for (let p in conteoPaginas) {
                if (conteoPaginas[p] > maxVistas) { maxVistas = conteoPaginas[p]; pagGanadora = p; }
            }
            document.getElementById('topPage').innerText = pagGanadora;

            const usuariosUnicos = new Set(analiticas.map(a => a.user_email).filter(e => e !== 'anonimo'));
            document.getElementById('totalLogins').innerText = usuariosUnicos.size;

            Chart.defaults.color = '#aaaaaa';
            const ctx = document.getElementById('graficaTiempo').getContext('2d');
            
            if (myChart) myChart.destroy(); 
            
            const fechasOrdenadas = Object.keys(conteoFechas).sort();
            const valoresFechas = fechasOrdenadas.map(f => conteoFechas[f]);

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: fechasOrdenadas, // Estas son las fechas que saldrán abajo
                    datasets: [{
                        label: 'Visitas',
                        data: valoresFechas,
                        borderColor: '#b91d1d',
                        backgroundColor: 'rgba(185, 29, 29, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3, 
                        pointBackgroundColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                // Agrega la palabra "visitas" al pasar el mouse por encima
                                label: function(context) {
                                    return ` ${context.raw} visitas`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#333333' },
                            ticks: { 
                                color: '#aaaaaa',
                                stepSize: 1 // Evita que salgan decimales (0.5 visitas)
                            }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#aaaaaa' } // Asegura que las fechas abajo sean visibles
                        }
                    }
                }
            });

            renderListaHTML('listaPaginas', conteoPaginas);
            renderListaHTML('listaNavegadores', conteoNavegadores);
            renderListaHTML('listaPaises', conteoPaises);
        }

        function renderListaHTML(elementoId, datosObjeto) {
            const contenedor = document.getElementById(elementoId);
            contenedor.innerHTML = ''; 

            const arrayDatos = Object.entries(datosObjeto).sort((a, b) => b[1] - a[1]);
            const maxValor = arrayDatos.length > 0 ? arrayDatos[0][1] : 1;

            arrayDatos.forEach(item => {
                const nombre = item[0];
                const cantidad = item[1];
                const porcentaje = (cantidad / maxValor) * 100;

                contenedor.innerHTML += `
                    <div class="lista-item">
                        <div class="lista-barra-fondo" style="width: ${porcentaje}%;"></div>
                        <span class="lista-texto">${nombre}</span>
                        <span class="lista-valor">${cantidad}</span>
                    </div>
                `;
            });

            if (arrayDatos.length === 0) {
                contenedor.innerHTML = '<p style="color:#666; font-size:0.9rem;">No hay datos para esta fecha.</p>';
            }
        }
    </script>
</body>
</html>
