<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
        }

        /* Pantalla de bloqueo si intentan entrar sin permiso */
        #pantallaBloqueo {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80vh;
            text-align: center;
        }

        #pantallaBloqueo h1 {
            color: #b91d1d;
            font-size: 3rem;
            text-transform: uppercase;
        }

        /* Contenedor principal del Dashboard oculto por defecto */
        #dashboardPrincipal {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-dashboard {
            border-bottom: 3px solid #b91d1d;
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-dashboard h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        /* Grid estilo Google Analytics */
        .grid-graficas {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .tarjeta-grafica {
            background-color: #3d3d3d;
            padding: 20px;
            border-radius: 6px;
            border-top: 5px solid #b91d1d;
            box-shadow: 0px 10px 15px rgba(0,0,0,0.5);
        }

        .tarjeta-grafica h3 {
            margin-top: 0;
            text-transform: uppercase;
            color: #f4f4f4;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Contenedor para que las gráficas sean responsivas */
        .canvas-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        /* Estadísticas rápidas arriba */
        .stats-rapidas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-caja {
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            border-left: 5px solid #b91d1d;
        }

        .stat-caja h4 { margin: 0; color: #aaaaaa; text-transform: uppercase; font-size: 0.9rem; }
        .stat-caja p { margin: 10px 0 0 0; font-size: 2.5rem; font-weight: bold; color: #ffffff; }
    </style>
</head>
<body>

    <div id="pantallaBloqueo">
        <h1>Acceso Restringido</h1>
        <p>Verificando credenciales de administrador...</p>
    </div>

    <div id="dashboardPrincipal">
        <div class="header-dashboard">
            <h1>Google Analytics - Proyecto Arjona</h1>
            <p id="txtUsuario">Admin conectado</p>
        </div>

        <div class="stats-rapidas">
            <div class="stat-caja">
                <h4>Total de Visitas</h4>
                <p id="totalVisitas">0</p>
            </div>
            <div class="stat-caja">
                <h4>Página más popular</h4>
                <p id="topPage" style="font-size: 1.5rem; padding-top:15px;">-</p>
            </div>
            <div class="stat-caja">
                <h4>Inicios de Sesión</h4>
                <p id="totalLogins">0</p>
            </div>
        </div>

        <div class="grid-graficas">
            <div class="tarjeta-grafica">
                <h3>Vistas por Sección</h3>
                <div class="canvas-container">
                    <canvas id="graficaPaginas"></canvas>
                </div>
            </div>
            <div class="tarjeta-grafica">
                <h3>Navegadores de Usuarios</h3>
                <div class="canvas-container">
                    <canvas id="graficaNavegadores"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Colores de tu paleta CSS para las gráficas
        const coloresArjona = ['#b91d1d', '#ffffff', '#777777', '#444444', '#ff4d4d', '#991111'];

        async function cargarDashboard() {
            // 1. SEGURIDAD: Comprobar si es un administrador válido
            const { data: { session } } = await clienteSupabase.auth.getSession();
            
            if (!session) {
                document.getElementById('pantallaBloqueo').innerHTML = "<h1>Error 403</h1><p>Debes iniciar sesión primero.</p>";
                return;
            }

            const { data: admins } = await clienteSupabase.from('admins').select('*').eq('email', session.user.email);
            
            if (!admins || admins.length === 0) {
                document.getElementById('pantallaBloqueo').innerHTML = "<h1>Acceso Denegado</h1><p>Tu correo no está en la lista blanca de administradores.</p>";
                return;
            }

            // Si pasa la seguridad, revelamos el panel
            document.getElementById('pantallaBloqueo').style.display = 'none';
            document.getElementById('dashboardPrincipal').style.display = 'block';
            document.getElementById('txtUsuario').innerText = `Conectado como: ${session.user.email}`;

            // 2. EXTRAER DATOS DE ANALÍTICAS
            const { data: analiticas, error } = await clienteSupabase.from('analiticas').select('*');
            if (error) { console.error(error); return; }

            // 3. PROCESAR LAS MATEMÁTICAS (Contadores)
            let totalVistas = 0;
            let totalLogins = 0;
            const conteoPaginas = {};
            const conteoNavegadores = {};

            analiticas.forEach(registro => {
                if (registro.event_type === 'page_view') {
                    totalVistas++;
                    // Filtramos nombres para que se vea limpio
                    let nombrePagina = registro.page_url.replace('.html', '').toUpperCase();
                    conteoPaginas[nombrePagina] = (conteoPaginas[nombrePagina] || 0) + 1;
                    
                    if(registro.browser) {
                        conteoNavegadores[registro.browser] = (conteoNavegadores[registro.browser] || 0) + 1;
                    }
                }
                // Si tuviéramos un evento de login explícito, lo sumaríamos. Por ahora contamos usuarios únicos
            });

            // Llenar estadísticas superiores
            document.getElementById('totalVisitas').innerText = totalVistas;
            
            // Calcular página más popular
            let maxVistas = 0;
            let pagGanadora = "-";
            for (let pag in conteoPaginas) {
                if (conteoPaginas[pag] > maxVistas) {
                    maxVistas = conteoPaginas[pag];
                    pagGanadora = pag;
                }
            }
            document.getElementById('topPage').innerText = pagGanadora;

            // Calcular usuarios únicos (como una forma de logins)
            const usuariosUnicos = new Set(analiticas.map(a => a.user_email).filter(e => e !== 'anonimo'));
            document.getElementById('totalLogins').innerText = usuariosUnicos.size;

            // 4. RENDERIZAR GRÁFICA DE BARRAS (Páginas)
            Chart.defaults.color = '#ffffff'; // Textos de gráficas en blanco
            
            const ctxPaginas = document.getElementById('graficaPaginas').getContext('2d');
            new Chart(ctxPaginas, {
                type: 'bar',
                data: {
                    labels: Object.keys(conteoPaginas),
                    datasets: [{
                        label: 'Número de Visitas',
                        data: Object.values(conteoPaginas),
                        backgroundColor: '#b91d1d', // Rojo Arjona
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#555555' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 5. RENDERIZAR GRÁFICA DE DONA (Navegadores)
            const ctxNavegadores = document.getElementById('graficaNavegadores').getContext('2d');
            new Chart(ctxNavegadores, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(conteoNavegadores),
                    datasets: [{
                        data: Object.values(conteoNavegadores),
                        backgroundColor: coloresArjona,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#ffffff' } }
                    }
                }
            });
        }

        // Ejecutar el motor al iniciar
        cargarDashboard();
    </script>
</body>
</html>
