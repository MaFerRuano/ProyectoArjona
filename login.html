<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido | Ricardo Arjona Project</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c2c2c;
            color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .login-box {
            background-color: #3d3d3d;
            padding: 50px 40px;
            border-radius: 8px;
            border-top: 10px solid #b91d1d;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        p {
            color: #b91d1d;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .btn-google {
            background-color: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 14px 25px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-google:hover {
            background-color: #b91d1d;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(185, 29, 29, 0.3);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Bienvenido</h1>
        <p>Al Mundo de Ricardo Arjona</p>
        
        <button class="btn-google" onclick="login()">
            Iniciar Sesión con Google
        </button>
    </div>

    <script>
        // Configuración de credenciales públicas
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://maferruano.github.io/Proyecto_ISDC/'
                }
            });
            if (error) console.error('Error:', error.message);
        }
    </script>
</body>
</html>
