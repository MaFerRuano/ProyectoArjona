<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videoteca | Ricardo Arjona</title>
    <style>
        /* =========================================
           ESTILOS MAESTROS
           ========================================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #2c2c2c; 
            color: #f4f4f4; 
        }

        header {
            background-color: #1a1a1a; 
            color: #ffffff;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 5px solid #b91d1d; 
        }

        header h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        header p {
            color: #b91d1d; 
            font-weight: bold;
            font-size: 1.2rem;
        }

        .container {
            max-width: 1000px; 
            margin: 50px auto;
            padding: 0 20px;
        }

        /* =========================================
           GRID DE VIDEOS
           ========================================= */
        .contenedor-videoteca {
            display: grid;
            grid-template-columns: 73% 24%; 
            justify-content: space-between;
        }

        .video-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            background-color: #000;
            border: 2px solid #3d3d3d;
            transition: all 0.3s ease;
        }

        /* Efecto hover general */
        .video-box:hover {
            border-color: #b91d1d;
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(185, 29, 29, 0.3);
            z-index: 2;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .columna-derecha {
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            height: 100%; 
        }

        /* =========================================
           NUEVO: CAPA INVISIBLE PARA CLICS
           ========================================= */
        .capa-clic {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; /* Se pone por encima del iframe */
            cursor: pointer; /* Cambia el mouse a una manita para indicar que es un botón */
            background-color: rgba(0, 0, 0, 0); /* Totalmente transparente */
            transition: background-color 0.3s;
        }

        /* Oscurecemos un poquito el video pequeño al pasar el mouse para que invite a hacer clic */
        .video-box:hover .capa-clic {
            background-color: rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 800px) {
            .contenedor-videoteca {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .columna-derecha {
                gap: 20px;
            }
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #888;
            background-color: #1a1a1a;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Videoteca Oficial</h1>
        <p>LOS GRANDES ÉXITOS EN FORMATO AUDIOVISUAL</p>
    </header>

    <main class="container">
        <div class="contenedor-videoteca">
            
            <div class="video-box">
                <iframe id="videoPrincipal" src="https://www.youtube.com/embed/Eecg_IkYwWg?si=p-TYe-XKh1vG6T7-" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

            <div class="columna-derecha">
                
                <div class="video-box">
                    <div class="capa-clic" onclick="intercambiarVideo(this)"></div>
                    <iframe src="https://www.youtube.com/embed/rtqe98TmTUE?si=D_oTnC6vk-FIMovy" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>

                <div class="video-box">
                    <div class="capa-clic" onclick="intercambiarVideo(this)"></div>
                    <iframe src="https://www.youtube.com/embed/U4_Ririesss?si=fMNZdHdZBka3wkSq" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>

                <div class="video-box">
                    <div class="capa-clic" onclick="intercambiarVideo(this)"></div>
                    <iframe src="https://www.youtube.com/embed/D1prB5z-RTU?si=MLDI083IQfL2XLGR" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Proyecto Web Ricardo Arjona | Videoteca Oficial</p>
    </footer>

    <script>
        function intercambiarVideo(capaClickeada) {
            // 1. Buscamos el reproductor grande
            const reproductorGrande = document.getElementById('videoPrincipal');
            
            // 2. Buscamos el reproductor pequeño que está justo debajo de la capa que clickeaste
            const reproductorPequeno = capaClickeada.nextElementSibling;

            // 3. Guardamos los links temporales
            const linkGrande = reproductorGrande.src;
            const linkPequeno = reproductorPequeno.src;

            // 4. ¡Hacemos el intercambio! El grande recibe el link del pequeño y viceversa
            reproductorGrande.src = linkPequeno;
            reproductorPequeno.src = linkGrande;
        }
    </script>
</body>
</html>
