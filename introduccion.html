<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introducción - Ricardo Arjona</title>
    <!-- Llamada al archivo de estilos profesional -->
    <link rel="stylesheet" href="style.css">
    <!-- Fuentes necesarias -->
    <link href="https://fonts.googleapis.com/css2?family=Homemade+Apple&family=Special+Elite&family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        /* Ajuste específico para el layout de esta página que usa Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Estilo para el reproductor que decidimos dejar fuera de las cajas */
        .spotify-libre {
            width: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-small {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
        }
        
        .foto-perfil-intro {
            width: 100%;
            max-width: 200px;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transform: rotate(-1deg);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="dashboard">
            
            <!-- COLUMNA IZQUIERDA: PERFIL -->
            <div class="glass-card">
                <h1 class="firma-moderna" style="font-family: 'Homemade Apple', cursive; text-align: center; font-size: 1.6rem; margin-bottom: 20px;">
                    Ricardo Arjona
                </h1>
                <img src="arjona-intro.png" class="foto-perfil-intro" alt="Ricardo Arjona">
                
                <div class="stats-grid">
                    <div class="stat-small">
                        <strong style="color: #b91d1d; font-size: 1.2rem; display: block;">+80M</strong>
                        <span style="font-size: 0.7rem; text-transform: uppercase;">Ventas</span>
                    </div>
                    <div class="stat-small">
                        <strong style="color: #b91d1d; font-size: 1.2rem; display: block;">15</strong>
                        <span style="font-size: 0.7rem; text-transform: uppercase;">Álbumes</span>
                    </div>
                </div>
            </div>

            <!-- COLUMNA CENTRAL: SPOTIFY Y CITA -->
            <div style="display: flex; flex-direction: column;">
                <span class="subtitulo-rojo" style="text-align: center;">Escuchar Ahora</span>
                
                <div class="spotify-libre">
                    <iframe style="border-radius:12px" 
                            src="https://open.spotify.com/embed/track/3clS9vS_N2u9MuvW9vNCOK?utm_source=generator" 
                            width="100%" height="352" frameBorder="0" allowfullscreen="" 
                            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                            loading="lazy">
                    </iframe>
                </div>

                <div class="glass-card" style="font-family: 'Special Elite', serif; font-style: italic; text-align: center; border-left: none; border-bottom: 4px solid #b91d1d;">
                    "Si el pasado te enseña, bienvenido sea..."
                </div>
            </div>

            <!-- COLUMNA DERECHA: BIO BREVE -->
            <div class="glass-card">
                <span class="subtitulo-rojo">Biografía Breve</span>
                
                <p style="font-size: 0.9rem; margin-bottom: 20px;">
                    Nacido en Jocotenango, Guatemala. Su lírica ha marcado a generaciones en toda Latinoamérica.
                </p>
                
                <p style="font-size: 0.9rem; border-left: 3px solid #555; padding-left: 10px; font-style: italic;">
                    Ex-seleccionado nacional de baloncesto, un artista que rompe moldes.
                </p>

                <a href="biografia.html" class="btn-arjona" style="margin-top: 30px; display: block;">
                    Leer más
                </a>
            </div>

        </div>
    </div>

</body>
</html>
