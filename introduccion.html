<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Homemade+Apple&family=Special+Elite&family=Montserrat:wght@300;700&display=swap');

        body {
            background-image: url('paper-background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            /* Bajamos el contenido 100px para que no estorbe al menú superior */
            padding: 100px 40px 40px 40px; 
            color: #2c2c2c;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* --- ESTILO GLASS (MENOS BLANCO Y MÁS SUTIL) --- */
        .glass-card {
            /* Bajamos la opacidad de 0.15 a 0.08 para que sea más transparente */
            background: rgba(255, 255, 255, 0.08); 
            /* Reducimos el blur de 15px a 6px para que sea menos intenso */
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .perfil-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .firma-moderna {
            font-family: 'Homemade Apple', cursive;
            color: #b91d1d;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .foto-perfil {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transform: rotate(-1deg);
            margin-bottom: 20px;
        }

        .cita-box {
            font-family: 'Special Elite', serif;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #555;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* --- REPRODUCTOR CENTRAL --- */
        .player-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .titulo-seccion {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #b91d1d;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        /* --- COLUMNA DE DATOS (DERECHA) --- */
        .stats-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-card {
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 10px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #b91d1d;
            display: block;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #888;
        }

        .lyrics-preview {
            font-family: 'Special Elite', serif;
            font-size: 0.75rem;
            color: #666;
            line-height: 1.6;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            font-style: italic;
        }

        /* --- FEATURES ABAJO --- */
        .features-row {
            grid-column: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
        }

        .icon-badge {
            width: 40px;
            height: 40px;
            background: #b91d1d;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            background: #b91d1d;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: auto;
        }

        .btn-action:hover {
            background: #901616;
            box-shadow: 0 8px 15px rgba(185, 29, 29, 0.2);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="glass-card perfil-box">
            <h1 class="firma-moderna">Ricardo Arjona</h1>
            <img src="arjona-intro.png" class="foto-perfil" alt="Arjona">
            <div class="cita-box">
                "Si el pasado te enseña, bienvenido sea..."
            </div>
        </div>

        <div class="player-box">
            <span class="titulo-seccion">Sintonía Actual</span>
            <div class="glass-card" style="padding: 10px;">
                <iframe style="border-radius:15px" src="https://open.spotify.com/embed/track/3clS9vS_N2u9MuvW9vNCOK?utm_source=generator0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <div class="features-row">
                <div class="glass-card feature-item">
                    <div class="icon-badge">♫</div>
                    <div>
                        <strong style="font-size: 0.85rem;">Gaby Moreno</strong>
                        <p style="margin:0; font-size: 0.65rem; color: #888;">Colaboración</p>
                    </div>
                </div>
                <div class="glass-card feature-item">
                    <div class="icon-badge">★</div>
                    <div>
                        <strong style="font-size: 0.85rem;">Independiente</strong>
                        <p style="margin:0; font-size: 0.65rem; color: #888;">Álbum 2011</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card stats-box">
            <span class="titulo-seccion">Estadísticas</span>
            
            <div class="stat-card">
                <span class="stat-value">590.4M</span>
                <span class="stat-label">Streams en Spotify</span>
            </div>

            <div class="stat-card">
                <span class="stat-value">#1</span>
                <span class="stat-label">Éxito Popular</span>
            </div>

            <span class="titulo-seccion">Lírica</span>
            <div class="lyrics-preview">
                "Fuiste tú, tenerte fue una foto tuya puesta en mi cartera, un beso y una flor un día de primavera..."
            </div>

            <button class="btn-action" onclick="location.href='discografia.html'">VER TODA LA DISCOGRAFÍA</button>
        </div>

    </div>

</body>
</html>
