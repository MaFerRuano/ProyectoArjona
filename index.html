<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricardo Arjona - Proyecto Oficial</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos globales para cuando se destruyen los marcos en el login */
        html.login-active, body.login-active {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #2c2c2c !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f4f4f4;
            display: flex !important;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* La capa oscura del pop-up flotante */
        #loginOverlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(26, 26, 26, 0.95); 
            backdrop-filter: blur(5px); 
            z-index: 999999; 
            justify-content: center;
            align-items: center;
        }

        /* Tu caja de Login clásica */
        .login-box {
            background-color: #3d3d3d;
            padding: 50px 40px;
            border-radius: 4px;
            border-top: 10px solid #b91d1d;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box h1 {
            color: #ffffff;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
        }

        .login-box p {
            color: #b91d1d;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            margin: 0 0 35px 0;
        }

        .btn-google {
            background-color: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 14px 25px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-google:hover {
            background-color: #b91d1d;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(185, 29, 29, 0.3);
        }
    </style>
</head>

<script>
    // NOTA MAFER: Validamos de inmediato si venimos de cerrar sesión ANTES de pintar los marcos
    const urlParams = new URLSearchParams(window.location.search);
    const ignorarSesion = urlParams.get('logout');

    if (ignorarSesion === 'true') {
        // Rompemos la carga de marcos inyectando directamente tu caja de login clásica en pantalla limpia
        document.documentElement.classList.add('login-active');
        document.write(`
            <body class="login-active">
                <div class="login-box">
                    <h1>Bienvenido</h1>
                    <p>Al Mundo de Ricardo Arjona</p>
                    <button class="btn-google" id="btnGoogleAuth">Iniciar Sesión con Google</button>
                </div>
            </body>
        `);
    } else {
        // Si no es un logout, pintamos la estructura normal de marcos
        document.write(`
            <frameset rows="120, *" border="0" frameborder="0" framespacing="0" id="mainFrameset">
                <frame src="menu.html" name="menu" noresize scrolling="no">
                <frame src="introduccion.html" name="contenido">
            </frameset>
        `);
    }
</script>

<script>
    // Inicialización del cliente
    const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
    const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Si entramos de forma normal (sin el parámetro logout), dejamos que Supabase maneje el pop-up flotante
    if (ignorarSesion !== 'true') {
        // Creamos dinámicamente la capa flotante sobre los marcos
        const overlay = document.createElement('div');
        overlay.id = 'loginOverlay';
        overlay.innerHTML = `
            <div class="login-box">
                <h1>Bienvenido</h1>
                <p>Al Mundo de Ricardo Arjona</p>
                <button class="btn-google" id="btnGoogleAuth">Iniciar Sesión con Google</button>
            </div>
        `;
        document.documentElement.appendChild(overlay);

        clienteSupabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        });
    }

    // Vinculamos el evento del botón de Google (sirve para ambos casos)
    document.getElementById('btnGoogleAuth').addEventListener('click', async () => {
        await clienteSupabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: 'https://maferruano.github.io/Proyecto_ISDC/',
                queryParams: {
                    prompt: 'select_account'
                }
            }
        });
    });
</script>
</html>
