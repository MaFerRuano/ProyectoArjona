<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricardo Arjona - Proyecto Oficial</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* Reseteamos el cuerpo de la página para que ocupe todo el espacio */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
        }

        /* Contenedor que simula la estructura exacta de tu frameset */
        .contenedor-marcos {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* El marco superior del menú */
        .marco-superior {
            height: 120px;
            width: 100%;
            border: none;
        }

        /* El marco inferior del contenido */
        .marco-inferior {
            flex-grow: 1;
            width: 100%;
            border: none;
        }

        /* La capa oscura del pop-up flotante */
        #loginOverlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(26, 26, 26, 0.75); 
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px);
            z-index: 999999; 
            justify-content: center;
            align-items: center;
        }

        /* Caja de Login clásica */
        .login-box {
            background-color: #3d3d3d;
            padding: 50px 40px;
            border-radius: 4px;
            border-top: 10px solid #b91d1d;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin: 20px;
        }

        .login-box h1 {
            color: #ffffff;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
        }

        .login-box p {
            color: #b91d1d;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            margin: 0 0 35px 0;
        }

        .btn-google {
            background-color: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 14px 25px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-google:hover {
            background-color: #b91d1d;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(185, 29, 29, 0.3);
        }

        /* =========================================
           DISEÑO DEL BOTÓN IR ARRIBA
           ========================================= */
        #btnScrollTop {
            display: none; /* Oculto por defecto, se muestra con JS */
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999998; 
            background-color: #b91d1d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, background-color 0.3s ease;
            justify-content: center;
            align-items: center;
        }

        #btnScrollTop:hover {
            background-color: #e62424;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="contenedor-marcos">
        <iframe src="menu.html" name="menu" class="marco-superior" scrolling="no"></iframe>
        <iframe src="introduccion.html" name="contenido" class="marco-inferior" id="iframeContenido"></iframe>
    </div>

    <!-- Botón Global para ir hacia arriba -->
    <button id="btnScrollTop" title="Ir arriba">▲</button>

    <div id="loginOverlay">
        <div class="login-box">
            <h1>Bienvenido</h1>
            <p>Al Mundo de Ricardo Arjona</p>
            <button class="btn-google" id="btnGoogleAuth">Iniciar Sesión con Google</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const overlay = document.getElementById('loginOverlay');

        // ==========================================
        // LÓGICA PARA RECORDAR LA ÚLTIMA PÁGINA
        // ==========================================
        const iframeContenido = document.getElementById('iframeContenido');
        const ultimaPaginaGuardada = sessionStorage.getItem('ultimaPagina');
        
        if (ultimaPaginaGuardada) {
            iframeContenido.src = ultimaPaginaGuardada;
        }

        // ==========================================
        // LÓGICA DEL BOTÓN IR ARRIBA (CENTRALIZADO)
        // ==========================================
        const btnScroll = document.getElementById('btnScrollTop');

        function revisarScroll() {
            try {
                // Si el iframe ha bajado más de 300px, muestra el botón
                if (iframeContenido.contentWindow.scrollY > 300) {
                    btnScroll.style.display = 'flex';
                } else {
                    btnScroll.style.display = 'none';
                }
            } catch (e) {
                // Silenciamos cualquier error de lectura mientras el iframe carga
            }
        }

        // Cada vez que se cargue una página nueva dentro del iframe, le conectamos el detector
        iframeContenido.addEventListener('load', () => {
            iframeContenido.contentWindow.addEventListener('scroll', revisarScroll);
            revisarScroll(); // Revisión inicial por si la página se cargó a la mitad
        });

        // Acción al hacer clic en el botón
        btnScroll.addEventListener('click', () => {
            iframeContenido.contentWindow.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // ==========================================
        // LÓGICA DE SESIÓN (SUPABASE)
        // ==========================================
        clienteSupabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        });

        clienteSupabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        });

        document.getElementById('btnGoogleAuth').addEventListener('click', async () => {
            await clienteSupabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://maferruano.github.io/ProyectoArjona/',
                    queryParams: {
                        prompt: 'select_account'
                    }
                }
            });
        });
    </script>
</body>
</html>
