<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricardo Arjona - Proyecto Oficial</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* La capa oscura que cubre todo el sitio de fondo */
        #loginOverlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(26, 26, 26, 0.95); 
            backdrop-filter: blur(5px); 
            z-index: 999999; 
            justify-content: center;
            align-items: center;
        }

        /* Tu caja de Login clásica */
        .login-box {
            background-color: #3d3d3d;
            padding: 50px 40px;
            border-radius: 4px;
            border-top: 10px solid #b91d1d;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box h1 {
            color: #ffffff;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
        }

        .login-box p {
            color: #b91d1d;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            margin: 0 0 35px 0;
        }

        .btn-google {
            background-color: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 14px 25px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-google:hover {
            background-color: #b91d1d;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(185, 29, 29, 0.3);
        }
    </style>
</head>

<frameset rows="120, *" border="0" frameborder="0" framespacing="0">
    <frame src="menu.html" name="menu" noresize scrolling="no">
    <frame src="introduccion.html" name="contenido">
    
    <noframes>
        <body>
            <div id="loginOverlay">
                <div class="login-box">
                    <h1>Bienvenido</h1>
                    <p>Al Mundo de Ricardo Arjona</p>
                    <button class="btn-google" id="btnGoogleAuth">Iniciar Sesión con Google</button>
                </div>
            </div>
            <p>Tu navegador no soporta marcos.</p>
        </body>
    </noframes>
</frameset>

<script>
    const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
    const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const overlay = document.getElementById('loginOverlay');
    document.documentElement.appendChild(overlay);

    // NOTA: Revisamos si venimos forzados por el botón de Cerrar Sesión
    const urlParams = new URLSearchParams(window.location.search);
    const ignorarSesion = urlParams.get('logout');

    if (ignorarSesion === 'true') {
        // Bloqueo inmediato sin consultar a Supabase para evitar el bucle de memoria
        overlay.style.display = 'flex';
    } else {
        // Comportamiento normal si no estamos cerrando sesión
        clienteSupabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        });
    }

    // Evento del botón de Google hacia la raíz
    document.getElementById('btnGoogleAuth').addEventListener('click', async () => {
        await clienteSupabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: 'https://maferruano.github.io/Proyecto_ISDC/',
                queryParams: {
                    prompt: 'select_account'
                }
            }
        });
    });
</script>
</html>
