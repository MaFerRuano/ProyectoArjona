<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú | Ricardo Arjona Project</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a !important; 
            display: flex;
            /* Distribuye: Título Izquierda, Menú Centro, Perfil Derecha */
            justify-content: space-between; 
            align-items: center;
            padding: 0 40px;
            height: 100px; 
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-bottom: 5px solid #b91d1d; 
        }

        .logo {
            color: #b91d1d; 
            font-weight: bold; 
            font-size: 1.2rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 150px; /* Ancho fijo para equilibrar el espacio con el perfil */
        }

        ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        /* Efecto hover: se pone rojo */
        a:hover {
            color: #ffffff;
            background-color: #b91d1d;
            transform: scale(1.05);
        }

        /* Clase activa corregida para mantener el color en la página actual */
        a.active {
            background-color: #b91d1d !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* CONTENEDOR DEL MENÚ DE USUARIO DESPLEGABLE (DROPDOWN) */
        .user-dropdown {
            position: relative;
            display: inline-block;
            width: 150px; /* Equilibra simétricamente el diseño con el logo */
            text-align: right;
        }

        /* El círculo del icono */
        .avatar-btn {
            background-color: #ffffff;
            color: #1a1a1a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background-color 0.3s;
            border: none;
        }

        .avatar-btn:hover {
            background-color: #b91d1d;
            color: #ffffff;
        }

        /* La cajita flotante con las opciones */
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background-color: #3d3d3d;
            min-width: 140px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.4);
            border-radius: 4px;
            border-top: 3px solid #b91d1d;
            z-index: 1000;
        }

        /* El botón de cerrar sesión dentro del menú desplegable */
        .dropdown-content button {
            color: #ffffff;
            background: none;
            border: none;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s;
        }

        .dropdown-content button:hover {
            background-color: #b91d1d;
        }

        /* Clase para mostrar el menú con JavaScript */
        .show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="logo">ARJONA</div>

    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)" class="active">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">Discografía</a></li>
        <li><a href="galeria.html" target="contenido" onclick="setActive(this)">Galería</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">Poética</a></li>
        <li><a href="equipo.html" target="contenido" onclick="setActive(this)">Equipo</a></li>
    </ul>

    <div class="user-dropdown">
        <button class="avatar-btn" onclick="toggleDropdown()">👤</button>
        <div id="myDropdown" class="dropdown-content">
            <button onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FUNCIÓN ACTIVA CORREGIDA: Cambia la selección visual al hacer clic sin importar los frames
        function setActive(element) {
            // Busca todos los enlaces en este documento y les quita la clase active
            document.querySelectorAll('#menuList a').forEach(link => {
                link.classList.remove('active');
            });
            // Se la agrega únicamente al elemento al que le diste clic
            element.classList.add('active');
        }

        // Abrir y cerrar el menú desplegable del usuario
        function toggleDropdown() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Cerrar el menú si el usuario hace clic afuera de él
        window.onclick = function(event) {
            if (!event.target.matches('.avatar-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        // Función de salida corregida a nivel raíz (window.top)
        async function logout() {
            await supabase.auth.signOut();
            /* Usar window.top asegura romper la estructura de marcos por completo,
               redirigiendo la pantalla completa del navegador de vuelta a index.html
            */
            window.top.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
