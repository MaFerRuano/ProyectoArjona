<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* DISEÑO ORIGINAL PARA COMPUTADORA (Centrado) */
        body {
            background-color: #1a1a1a !important; 
            display: flex;
            justify-content: center; /* Vuelve a estar centrado para PC */
            align-items: center;
            height: 100px; 
            overflow: visible; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-bottom: 5px solid #b91d1d; 
            position: relative;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        a:hover {
            color: #ffffff;
            background-color: #b91d1d;
            transform: scale(1.05);
        }

        a.active {
            background-color: #b91d1d !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .user-menu-container {
            position: absolute;
            right: 40px;
            display: flex;
            align-items: center;
        }

        .vector-avatar-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            padding: 5px;
            transition: transform 0.2s ease;
        }

        .vector-avatar-btn:hover {
            transform: scale(1.1);
        }

        .vector-avatar-btn:hover svg path {
            fill: #ffffff; 
        }

        /* MENÚ HORIZONTAL ANTI-CORTE */
        .dropdown-box {
            display: none;
            position: absolute;
            right: 100%; 
            margin-right: 15px; 
            top: 50%;
            transform: translateY(-50%); 
            background-color: #3d3d3d;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 4px;
            border-bottom: 3px solid #b91d1d;
            z-index: 99999;
            white-space: nowrap; 
        }

        .dropdown-box.show {
            display: flex; 
            flex-direction: row;
        }

        .dropdown-box button {
            color: #ffffff;
            background: none;
            border: none;
            border-right: 1px solid #555555; 
            padding: 12px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.3s;
        }

        .dropdown-box button:last-child {
            border-right: none; 
        }

        .dropdown-box button:hover {
            background-color: #b91d1d;
        }

        /* =========================================
           MAGIA RESPONSIVA: SOLO APLICA EN CELULARES
           ========================================= */
        @media (max-width: 768px) {
            body {
                justify-content: flex-start; /* Alinea a la izquierda solo en cel */
                padding-left: 15px;
            }

            ul {
                overflow-x: auto; /* Activa el scroll horizontal */
                white-space: nowrap; /* Evita que los botones se vayan para abajo */
                width: calc(100% - 60px); /* Deja espacio exacto para el botón de usuario */
                padding-right: 20px;
                scrollbar-width: none; /* Oculta la barra en Firefox */
                -webkit-overflow-scrolling: touch; /* Scroll suave en iPhone */
                gap: 10px; /* Reduce el espacio entre botones */
            }

            ul::-webkit-scrollbar {
                display: none; /* Oculta la barra en Chrome/Safari */
            }

            a {
                font-size: 0.8rem;
                padding: 10px 12px;
                display: inline-block;
            }

            .user-menu-container {
                right: 15px;
                background-color: #1a1a1a; /* Evita que el texto pase por debajo del icono */
                padding-left: 10px;
                height: 100%;
            }
        }
    </style>
</head>
<body>
    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">Discografía</a></li>
        <li><a href="tour.html" target="contenido" onclick="setActive(this)">Tour</a></li>
        <li><a href="galeria.html" target="contenido" onclick="setActive(this)">Galería</a></li>
        <li><a href="videos.html" target="contenido" onclick="setActive(this)">Videoteca</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">Poética</a></li>
        <li><a href="equipo.html" target="contenido" onclick="setActive(this)">Equipo</a></li>
    </ul>

    <div class="user-menu-container">
        <div id="dropdownMenu" class="dropdown-box">
            <button id="btnAdminPanel" style="display: none;" onclick="abrirPanelAdmin()">Admin Analíticas</button>
            <button onclick="logout()">Cerrar Sesión</button>
        </div>
        
        <button class="vector-avatar-btn" onclick="toggleMenu(event)">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="#b91d1d"/>
            </svg>
        </button>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function guardarTiempoPaginaAnterior() {
            const lastRowId = sessionStorage.getItem('lastRowId');
            const startTime = sessionStorage.getItem('pageStartTime');
            
            if (lastRowId && startTime) {
                const segundosPasados = Math.floor((Date.now() - parseInt(startTime)) / 1000);
                await clienteSupabase.from('analiticas')
                    .update({ duration_seconds: segundosPasados })
                    .eq('id', lastRowId);
            }
        }

        async function inicializarMenu() {
            const { data: { session } } = await clienteSupabase.auth.getSession();
            const correoUsuario = session ? session.user.email : 'anonimo';

            if (session) {
                const { data: admins } = await clienteSupabase.from('admins').select('*').eq('email', correoUsuario);
                if (admins && admins.length > 0) {
                    document.getElementById('btnAdminPanel').style.display = 'block';
                }
            }

            const ultimaPagina = sessionStorage.getItem('ultimaPagina') || 'introduccion.html';

            document.querySelectorAll('a').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === ultimaPagina) {
                    link.classList.add('active');
                    // Solo hace el scroll automático si la pantalla es de celular
                    if(window.innerWidth <= 768) {
                        link.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
                    }
                }
            });

            if (ultimaPagina !== 'introduccion.html') {
                window.open(ultimaPagina, 'contenido');
            } else {
                const homeLink = document.querySelector('a[href="introduccion.html"]');
                homeLink.classList.add('active');
            }

            let navegadorInfo = "Otro";
            const ua = navigator.userAgent;
            if (ua.includes("Edg")) navegadorInfo = "Edge";
            else if (ua.includes("Chrome")) navegadorInfo = "Chrome";
            else if (ua.includes("Firefox")) navegadorInfo = "Firefox";
            else if (ua.includes("Safari") && !ua.includes("Chrome")) navegadorInfo = "Safari";

            try {
                const { data, error } = await clienteSupabase.from('analiticas').insert([{
                    page_url: ultimaPagina,
                    event_type: 'page_view',
                    user_email: correoUsuario,
                    browser: navegadorInfo
                }]).select();

                if (data && data.length > 0) {
                    sessionStorage.setItem('lastRowId', data[0].id);
                    sessionStorage.setItem('pageStartTime', Date.now());
                }
            } catch (e) {}
        }

        inicializarMenu();

        async function setActive(element) {
            await guardarTiempoPaginaAnterior();
            
            document.querySelectorAll('a').forEach(link => link.classList.remove('active'));
            element.classList.add('active');
            
            // Centra el botón que tocaste solo si estás en celular
            if(window.innerWidth <= 768) {
                element.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
            }

            const rutaDestino = element.getAttribute('href');
            sessionStorage.setItem('ultimaPagina', rutaDestino);

            const { data: { session } } = await clienteSupabase.auth.getSession();
            const correoActual = session ? session.user.email : 'anonimo';

            const { data } = await clienteSupabase.from('analiticas').insert([{
                page_url: rutaDestino,
                event_type: 'page_view',
                user_email: correoActual
            }]).select();

            if (data && data.length > 0) {
                sessionStorage.setItem('lastRowId', data[0].id);
                sessionStorage.setItem('pageStartTime', Date.now());
            }
        }

        function toggleMenu(event) {
            event.stopPropagation();
            document.getElementById("dropdownMenu").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.vector-avatar-btn')) {
                var dropdown = document.getElementById("dropdownMenu");
                if (dropdown.classList.contains('show')) {
                    dropdown.classList.remove('show');
                }
            }
        }

        async function abrirPanelAdmin() {
            await guardarTiempoPaginaAnterior();
            document.querySelectorAll('a').forEach(link => link.classList.remove('active'));
            window.open('admin.html', 'contenido');
            document.getElementById("dropdownMenu").classList.remove('show');
            sessionStorage.setItem('ultimaPagina', 'admin.html');
        }

        async function logout() {
            await guardarTiempoPaginaAnterior();
            const { data: { session } } = await clienteSupabase.auth.getSession();
            if (session) {
                await clienteSupabase.from('analiticas').insert([{
                    page_url: 'menu_superior', event_type: 'logout', user_email: session.user.email
                }]);
            }
            await clienteSupabase.auth.signOut();
            localStorage.clear();
            sessionStorage.clear();
            window.top.location.reload();
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                guardarTiempoPaginaAnterior();
            }
        });
    </script>
</body>
</html>
