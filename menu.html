<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #f4f1ea; /* Restaurado el color papel viejo */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            border-right: 2px solid #dcd7c9;
            transition: all 0.5s ease;
            position: relative;
        }

        h2 { color: #333; border-bottom: 2px solid #333; margin-top: 0; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 20px 0; }
        a { 
            text-decoration: none; 
            color: #555; 
            font-weight: bold; 
            display: block;
        }
        a:hover { color: #b91d1d; }

        /* BOTÓN PARA ESCONDER */
        .btn-toggle {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #b91d1d;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 5px;
        }

        /* Clase para cuando está escondido */
        .escondido {
            transform: translateX(-200px);
        }
    </style>
</head>
<body>
    <button class="btn-toggle" onclick="toggleMenu()">◀</button>
    
    <h2>Arjona</h2>
    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido">1. Introducción</a></li>
        <li><a href="biografia.html" target="contenido">2. Biografía</a></li>
        <li><a href="discografia.html" target="contenido">3. Discografía</a></li>
        <li><a href="poetica.html" target="contenido">4. Estilo Poético</a></li>
        <li><a href="galeria.html" target="contenido">5. Galería</a></li>
        <li><a href="acerca_de.html" target="contenido">6. Acerca de</a></li>
    </ul>

    <script>
        let abierto = true;
        function toggleMenu() {
            const fs = window.parent.document.getElementById('masterFrameset');
            const btn = document.querySelector('.btn-toggle');
            
            if (abierto) {
                fs.setAttribute('cols', '50, *'); // Se hace chiquito
                btn.innerHTML = "▶";
                document.getElementById('menuList').style.display = 'none';
            } else {
                fs.setAttribute('cols', '250, *'); // Vuelve a su tamaño
                btn.innerHTML = "◀";
                document.getElementById('menuList').style.display = 'block';
            }
            abierto = !abierto;
        }
    </script>
</body>
</html>
