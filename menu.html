<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Manteniendo el codigo CSS */
            background-color: #1a1a1a !important; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px; /* Ajustado al tamaño de la fila en el index */
            overflow: hidden;
            /* Misma fuente que las otras paginas */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Linea roja inferior para conectar con el diseño de las paginas */
            border-bottom: 5px solid #b91d1d; 
            position: relative; /* Necesario para ubicar el perfil a la derecha sin mover el centro */
        }

        ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        a {
            text-decoration: none;
            color: #ffffff; /* Texto blanco sobre fondo oscuro */
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        /* Efecto hover: se pone rojo */
        a:hover {
            color: #ffffff;
            background-color: #b91d1d;
            transform: scale(1.05);
        }

        /* Clase activa: resalta en que pagina se esta */
        a.active {
            background-color: #b91d1d !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* CONTENEDOR DEL DROPDOWN DE USUARIO UBICADO A LA DERECHA */
        .user-dropdown {
            position: absolute;
            right: 40px;
            display: inline-block;
        }

        /* Icono de usuario como vector de texto color rojo arjona y sin fondos */
        .avatar-btn {
            background: none;
            color: #b91d1d;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s ease;
            padding: 5px;
        }

        .avatar-btn:hover {
            transform: scale(1.1);
        }

        /* Cajita flotante del menú de cerrar sesión */
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 40px;
            background-color: #3d3d3d;
            min-width: 140px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 4px;
            border-top: 3px solid #b91d1d;
            z-index: 99999;
        }

        .dropdown-content button {
            color: #ffffff;
            background: none;
            border: none;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s;
        }

        .dropdown-content button:hover {
            background-color: #b91d1d;
        }
    </style>
</head>
<body>

    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)" class="active">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">Discografía</a></li>
        <li><a href="galeria.html" target="contenido" onclick="setActive(this)">Galería</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">Poética</a></li>
        <li><a href="equipo.html" target="contenido" onclick="setActive(this)">Equipo</a></li>
    </ul>

    <div class="user-dropdown">
        <button class="avatar-btn" id="avatarClick">👤</button>
        <div id="myDropdown" class="dropdown-content">
            <button onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function setActive(element) {
            // Remueve la clase activa de todos los enlaces del documento
            document.querySelectorAll('a').forEach(link => link.classList.remove('active'));
            // Se la agrega únicamente al botón que fue presionado
            element.classList.add('active');
        }

        // CONTROL DEL DESPLEGABLE CORREGIDO
        const avatarBtn = document.getElementById('avatarClick');
        const dropdownMenu = document.getElementById('myDropdown');

        avatarBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Evita que el evento se disipe en la estructura de marcos
            if (dropdownMenu.style.display === 'block') {
                dropdownMenu.style.display = 'none';
            } else {
                dropdownMenu.style.display = 'block';
            }
        });

        // Oculta el menú desplegable si hacen clic en cualquier otra área de la barra
        document.addEventListener('click', () => {
            dropdownMenu.style.display = 'none';
        });

        // FUNCIÓN DE LOGOUT DEFINITIVA
        async function logout() {
            await supabase.auth.signOut();
            // Viaja a la raíz rompiendo los marcos para regresar al login de forma forzada
            window.top.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
