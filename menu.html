<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #1a1a1a; /* Fondo oscuro para que sea elegante */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        h2 { 
            font-size: 1rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            border-bottom: 1px solid #b91d1d;
            padding-bottom: 10px;
            width: 100%;
            text-align: center;
        }

        ul { 
            list-style: none; 
            padding: 0; 
            width: 100%;
        }

        li { 
            margin: 25px 0; 
            text-align: center;
        }

        a { 
            text-decoration: none; 
            color: #aaa; 
            font-size: 0.8rem;
            font-weight: bold;
            display: block;
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* Efecto al pasar el mouse */
        a:hover { 
            color: #fff; 
            transform: scale(1.1);
        }

        /* Línea decorativa roja (Rojo Arjona) */
        .linea {
            height: 50px;
            width: 2px;
            background-color: #b91d1d;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <h2>RA</h2>
    
    <ul>
        <li><a href="introduccion.html" target="contenido" title="Inicio">Intro</a></li>
        <li><a href="biografia.html" target="contenido" title="Biografía">Bio</a></li>
        <li><a href="discografia.html" target="contenido" title="Discografía">Discos</a></li>
        <li><a href="galeria.html" target="contenido" title="Galería">Fotos</a></li>
        <li><a href="acerca_de.html" target="contenido" title="Equipo">Info</a></li>
    </ul>

    <div class="linea"></div>
</body>
</html>
