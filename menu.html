<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #f4f1ea; 
            font-family: 'Helvetica', sans-serif;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        h2 { color: #333; border-bottom: 2px solid #333; font-family: 'Courier New', monospace; }
        ul { list-style-type: none; padding: 0; flex-grow: 1; }
        li { margin: 12px 0; }
        a { text-decoration: none; color: #555; font-weight: bold; font-family: 'Courier New', monospace; }
        a:hover { color: #b91d1d; }

        /* --- DISEÑO INSPIRADO EN TU IMAGEN --- */
        .playlist-container {
            background-color: #ffffff;
            border-radius: 35px;
            padding: 25px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            margin-top: auto;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* El Disco Vinilo Grande a la izquierda */
        .vinilo-visual {
            position: absolute;
            left: -90px;
            top: 15%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #222 0%, #000 30%, #111 40%, #000 60%, #222 100%);
            border-radius: 50%;
            z-index: 1;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.4);
            animation: girar 10s linear infinite;
        }

        /* Centro del disco con la foto de Arjona */
        .centro-foto {
            position: absolute;
            top: 32%;
            left: 32%;
            width: 36%;
            height: 36%;
            border-radius: 50%;
            border: 3px solid #fff;
            background-image: url('arjona-intro.png');
            background-size: cover;
            background-position: center;
        }

        .user-info {
            text-align: right;
            font-size: 0.7rem;
            color: #aaa;
        }

        .song-info {
            text-align: right;
            margin-top: 20px;
            z-index: 2;
        }

        .song-info h3 { margin: 0; color: #4a90e2; font-size: 1.2rem; }
        .song-info p { margin: 0; color: #888; font-size: 0.8rem; }

        /* Botones de control estilo tu imagen */
        .controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-play {
            width: 35px;
            height: 35px;
            background-color: #d0e1f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: #4a90e2;
        }

        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h2>Arjona</h2>
    <ul>
        <li><a href="introduccion.html" target="contenido">Home</a></li>
        <li><a href="biografia.html" target="contenido">Biografía</a></li>
        <li><a href="discografia.html" target="contenido">Playlist</a></li>
        <li><a href="acerca_de.html" target="contenido">Equipo</a></li>
    </ul>

    <div class="playlist-container">
        <div class="user-info">
            <span>@mafer_arjona</span><br>
            <strong>23k seguidores</strong>
        </div>

        <div class="vinilo-visual">
            <div class="centro-foto"></div>
        </div>

        <div class="song-info">
            <h3>Fuiste tú</h3>
            <p>Ricardo Arjona</p>
        </div>

        <div class="controls">
            <button class="btn-play">II</button>
            <button class="btn-play">▶</button>
        </div>
    </div>

</body>
</html>
