<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: transparent; /* Sin fondo */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between; /* Firma a la izquierda, links a la derecha */
            align-items: center;
            height: 100px;
            box-sizing: border-box;
            overflow: hidden;
        }

        h2 { 
            color: #b91d1d; 
            margin: 0; 
            font-size: 1.5rem;
            letter-spacing: 3px;
            border: none;
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0;
            display: flex; /* Pone los links uno a la par del otro */
            gap: 25px;
        }

        a { 
            text-decoration: none; 
            color: #555; 
            font-weight: bold; 
            font-size: 0.9rem;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        a:hover { 
            color: #b91d1d; 
        }

        /* Clase para la página seleccionada */
        .active {
            color: #fff !important;
            background-color: #b91d1d;
            box-shadow: 0 4px 10px rgba(185, 29, 29, 0.2);
        }

        /* Quitamos el botón de esconder porque arriba ya no estorba tanto, 
           pero si lo quieres mantener, se puede ajustar */
        .btn-toggle { display: none; }
    </style>
</head>
<body>
    
    <h2>ARJONA</h2>

    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)" class="active">INTRO</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">BIO</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">DISCOS</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">POÉTICA</a></li>
        <li><a href="acerca_de.html" target="contenido" onclick="setActive(this)">EQUIPO</a></li>
    </ul>

    <script>
        function setActive(element) {
            const links = document.querySelectorAll('a');
            links.forEach(link => link.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
