<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería | Ricardo Arjona</title>
    <style>
        /* =========================================
           ESTILOS MAESTROS (Idénticos a Biografía y Videos)
           ========================================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #2c2c2c; 
            color: #f4f4f4; 
        }

        header {
            background-color: #1a1a1a; 
            color: #ffffff;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 5px solid #b91d1d; 
        }

        header h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        header p {
            color: #b91d1d; 
            font-weight: bold;
            font-size: 1.2rem;
            /* Se omite el margin-top tal como ajustaste antes */
        }

        .container {
            max-width: 1100px; /* Ancho ajustado para la cuadrícula de fotos */
            margin: 50px auto;
            padding: 0 20px;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #888;
            background-color: #1a1a1a;
            margin-top: 50px;
        }

        /* =========================================
           ESTILOS ESPECÍFICOS DE LA GALERÍA
           ========================================= */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .gallery-item {
            background-color: #3d3d3d;
            padding: 15px;
            border-radius: 4px;
            border-bottom: 5px solid #b91d1d;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            text-align: center; /* Alineación del texto de la foto */
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            /* NOTA MAFER: Le puse una altura fija de 250px a todas las fotos para que la cuadrícula se vea pareja */
            height: 250px; 
            /* NOTA MAFER: Usar object-fit cover es clave para que las fotos no se apachen ni se estiren, solo se recorta el sobrante */
            object-fit: cover; 
            border-radius: 2px;
            border: 1px solid #444;
        }

        .gallery-item p {
            margin-top: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- CABECERA MAESTRA -->
    <header>
        <h1>Galería de Fotos</h1>
        <p>MOMENTOS INOLVIDABLES</p>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="container">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="Arjona_Antigua.png" alt="Arjona en Antigua">
                <p>Antigua Guatemala</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Bandera_Guate.png" alt="Arjona con Bandera">
                <p>Orgullo de Guatemala</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Cabaret.png" alt="Arjona Cabaret">
                <p>Circo Soledad Cabaret</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Gaby_Moreno.png" alt="Arjona y Gaby Moreno">
                <p>Fuiste Tú ft. Gaby Moreno</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Publico.png" alt="Arjona ante el Público">
                <p>En Vivo con su Público</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Taxi.png" alt="Arjona Historia de Taxi">
                <p>Historia de Taxi</p>
            </div>
        </div>
    </main>

    <!-- PIE DE PÁGINA MAESTRO -->
    <footer>
        <p>&copy; 2026 Proyecto Web Ricardo Arjona | Galería Oficial</p>
    </footer>

</body>
</html>
