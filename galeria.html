<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería | Ricardo Arjona</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            background-color: #2c2c2c; 
            color: #f4f4f4; 
            text-align: center;
        }

        h1 {
            color: #b91d1d;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .gallery-item {
            background-color: #3d3d3d;
            padding: 15px;
            border-radius: 4px;
            border-bottom: 5px solid #b91d1d;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            /* NOTA MAFER: Le puse una altura fija de 250px a todas las fotos para que la cuadrícula se vea pareja */
            height: 250px; 
            /* NOTA MAFER: Usar object-fit cover es clave para que las fotos no se apachen ni se estiren, solo se recorta el sobrante */
            object-fit: cover; 
            border-radius: 2px;
            border: 1px solid #444;
        }

        .gallery-item p {
            margin-top: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>Galería de Fotos</h1>

    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="Arjona_Antigua.png" alt="Arjona en Antigua">
            <p>Antigua Guatemala</p>
        </div>
        <div class="gallery-item">
            <img src="Arjona_Bandera_Guate.png" alt="Arjona con Bandera">
            <p>Orgullo de Guatemala</p>
        </div>
        <div class="gallery-item">
            <img src="Arjona_Cabaret.png" alt="Arjona Cabaret">
            <p>Circo Soledad Cabaret</p>
        </div>
        <div class="gallery-item">
            <img src="Arjona_Gaby_Moreno.png" alt="Arjona y Gaby Moreno">
            <p>Fuiste Tú ft. Gaby Moreno</p>
        </div>
        <div class="gallery-item">
            <img src="Arjona_Publico.png" alt="Arjona ante el Público">
            <p>En Vivo con su Público</p>
        </div>
        <div class="gallery-item">
            <img src="Arjona_Taxi.png" alt="Arjona Historia de Taxi">
            <p>Historia de Taxi</p>
        </div>
    </div>

</body>
</html>
