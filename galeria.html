<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería | Ricardo Arjona</title>
    <style>
        /* =========================================
           ESTILOS MAESTROS (Idénticos a Biografía y Videos)
           ========================================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #2c2c2c; 
            color: #f4f4f4; 
        }

        header {
            background-color: #1a1a1a; 
            color: #ffffff;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 5px solid #b91d1d; 
        }

        header h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        header p {
            color: #b91d1d; 
            font-weight: bold;
            font-size: 1.2rem;
            /* Se omite el margin-top tal como ajustaste antes */
        }

        .container {
            max-width: 1100px; /* Ancho ajustado para la cuadrícula de fotos */
            margin: 50px auto;
            padding: 0 20px;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #888;
            background-color: #1a1a1a;
            margin-top: 50px;
        }

        /* =========================================
           ESTILOS ESPECÍFICOS DE LA GALERÍA
           ========================================= */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .gallery-item {
            background-color: #3d3d3d;
            padding: 15px;
            border-radius: 4px;
            border-bottom: 5px solid #b91d1d;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            text-align: center; 
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 250px; 
            object-fit: cover; 
            border-radius: 2px;
            border: 1px solid #444;
            cursor: pointer; /* Cambia el cursor a una manita para indicar que se puede hacer clic */
            transition: opacity 0.3s ease;
        }

        .gallery-item img:hover {
            opacity: 0.8; /* Pequeño efecto visual al pasar el mouse por la foto */
        }

        .gallery-item p {
            margin-top: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* =========================================
           ESTILOS DEL POP-UP (LIGHTBOX)
           ========================================= */
        .modal {
            display: none; /* Oculto por defecto */
            position: fixed;
            z-index: 999999;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9); /* Fondo negro casi sólido */
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px); /* Efecto borroso de fondo */
        }

        .modal-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 4px;
            border: 3px solid #b91d1d; /* Borde rojo característico del proyecto */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            object-fit: contain; /* Asegura que la imagen no se distorsione al agrandarse */
            animation: zoomIn 0.3s ease; /* Animación de entrada suave */
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #ffffff;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #b91d1d;
        }
    </style>
</head>
<body>

    <!-- CABECERA MAESTRA -->
    <header>
        <h1>Galería de Fotos</h1>
        <p>MOMENTOS INOLVIDABLES</p>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="container">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="Arjona_Antigua.png" alt="Arjona en Antigua">
                <p>Antigua Guatemala</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Bandera_Guate.png" alt="Arjona con Bandera">
                <p>Orgullo de Guatemala</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Cabaret.png" alt="Arjona Cabaret">
                <p>Circo Soledad Cabaret</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Gaby_Moreno.png" alt="Arjona y Gaby Moreno">
                <p>Fuiste Tú ft. Gaby Moreno</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Publico.png" alt="Arjona ante el Público">
                <p>En Vivo con su Público</p>
            </div>
            <div class="gallery-item">
                <img src="Arjona_Taxi.png" alt="Arjona Historia de Taxi">
                <p>Historia de Taxi</p>
            </div>
        </div>
    </main>

    <!-- PIE DE PÁGINA MAESTRO -->
    <footer>
        <p>&copy; 2026 Proyecto Web Ricardo Arjona | Galería Oficial</p>
    </footer>

    <!-- =========================================
         ESTRUCTURA DEL POP-UP (LIGHTBOX)
         ========================================= -->
    <div id="imageModal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="imgAmpliada" src="" alt="Imagen ampliada">
    </div>

    <!-- =========================================
         SCRIPT PARA HACER FUNCIONAR EL POP-UP
         ========================================= -->
    <script>
        // Obtenemos los elementos del HTML
        const modal = document.getElementById("imageModal");
        const imgAmpliada = document.getElementById("imgAmpliada");
        const closeBtn = document.querySelector(".close-btn");
        
        // Seleccionamos todas las imágenes de la galería
        const imagenesGaleria = document.querySelectorAll(".gallery-item img");

        // Le agregamos el evento de clic a cada imagen
        imagenesGaleria.forEach(img => {
            img.addEventListener("click", function() {
                modal.style.display = "flex"; // Mostramos la pantalla oscura
                imgAmpliada.src = this.src; // Le pasamos la ruta de la imagen a la que se le dio clic
            });
        });

        // Evento para cerrar dándole a la 'X'
        closeBtn.addEventListener("click", () => {
            modal.style.display = "none";
        });

        // Evento para cerrar dándole clic a cualquier parte del fondo oscuro
        window.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        });
    </script>

</body>
</html>
